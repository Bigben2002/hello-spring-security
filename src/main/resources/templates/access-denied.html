<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>접근 권한 없음 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .denied-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .denied-icon { width: 64px; height: 64px; border-radius: 50%; background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card denied-card">
                <div class="card-body p-5 text-center">
                    <div class="denied-icon d-inline-flex align-items-center justify-content-center fs-3 fw-bold mb-3">
                        !
                    </div>
                    <h4 class="fw-bold mb-2">접근 권한이 없습니다</h4>
                    <p class="text-muted mb-4">관리자 권한이 필요한 페이지입니다.</p>
                    <div class="bg-light border rounded-3 p-3 mb-4 text-start">
                        <p class="mb-1">
                            <span class="fw-semibold">오류:</span>
                            <span th:text="${statusCode + ' ' + errorName}">403 Forbidden</span>
                        </p>
                        <p class="mb-0">
                            <span class="fw-semibold">요청 경로:</span>
                            <span th:text="${requestUri}">/products/1/edit</span>
                        </p>
                    </div>
                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{/home}" class="btn btn-primary px-4">홈으로</a>
                        <a th:href="@{/products}" class="btn btn-outline-secondary px-4">상품 목록</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="container mt-5 pb-3">
    <hr class="text-muted">
    <p class="text-center text-muted small mb-0"
       th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' │ 학번: 2171073 │ 성명: 이경석'}">
        실습 수행 일시: 2026년 05월 31일 (일) 오후 02:34:17 │ 학번: 2171073 │ 성명: 이경석
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
